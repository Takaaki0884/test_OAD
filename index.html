<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>スポットマップ</title>
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; }
    .panel { position: absolute; top: 10px; left: 10px; z-index: 1000; background: #fff; padding: 10px 12px; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.25); font-size: 13px; max-height: 70vh; overflow: auto; }
    .panel label { display: flex; align-items: center; margin: 4px 0; cursor: pointer; }
    .panel .swatch { width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; border: 2px solid rgba(0,0,0,.3); }
    .popup img { width: 220px; max-width: 100%; border-radius: 6px; display: block; margin: 6px 0; }
    .popup .meta { font-size: 12px; color: #555; }
    .popup .desc { margin-top: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
<div id="map"></div>
<div class="panel" id="filterPanel"><b>カテゴリ</b><br></div>
<script>
const palette = [
  "#e6194b","#3cb44b","#4363d8","#f58231",
  "#911eb4","#46f0f0","#f032e6","#bcf60c",
  "#008080","#9a6324","#808000","#000075"
];

// JSONファイルを読み込む（spots.jsonと同じディレクトリに置く）
fetch('spots.json')
  .then(r => r.json())
  .then(spots => {
    const categories = [...new Set(spots.map(s => s.category))];
    const categoryColors = {};
    categories.forEach((c, i) => categoryColors[c] = palette[i % palette.length]);
    const map = L.map("map");
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/cnst layersByCategory = {};
    categories.forEach(c => layersByCategory[c] = L.layerGroup().addTo(map));
    const bounds = [];
    spots.forEach(s => {
      if (!isFinite(s.lat) || !isFinite(s.lng)) return;
      bounds.push([s.lat, s.lng]);
      const popup = `
        <div class="popup">
          <strong>${escapeHtml(s.name)}</strong>
          <div class="meta">${escapeHtml(s.category)} / ${escapeHtml(s.spot)}</div>
          ${s.image ? `<img src="${encodeURI(s.image)}        <div class="desc">${escapeHtml(s.description || "")}</div>
          ${s.link ? `<a hrefeURI(s.link)}詳細を見る →</a>` : ""}
        </div>
      `;
      L.marker([s.lat, s.lng], {
        icon: pinIcon(categoryColors[s.category])
      })
      .bindPopup(popup)
      .addTo(layersByCategory[s.category]);
    });
    if (bounds.length) map.fitBounds(bounds, { padding: [20,20] });

    // カテゴリフィルタUI
    const panel = document.getElementById("filterPanel");
    categories.forEach(cat => {
      const label = document.createElement("label");
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = true;
      checkbox.onchange = () => {
        if (checkbox.checked) {
          map.addLayer(layersByCategory[cat]);
        } else {
          map.removeLayer(layersByCategory[cat]);
        }
      };
      const swatch = document.createElement("span");
      swatch.className = "swatch";
      swatch.style.background = categoryColors[cat];
      label.appendChild(checkbox);
      label.appendChild(swatch);
      label.appendChild(document.createTextNode(cat));
      panel.appendChild(label);
    });

    function pinIcon(color) {
      const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="25" height="41" viewBox="0 0 25 41">
        <path d="M12.5 0C5.6 0 0 5.6 0 12.5C0 22.2 12.5 41 12.5 41S25 22.2 25 12.5C25 5.6 19.4 0 12.5 0Z"
          fill="${color}" stroke="rgba(0,0,0,.3)" stroke-width="1"/>
        <circle cx="12.5" cy="12.5" r="5" fill="white"/>
      </svg>`;
      return L.icon({
        iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
        iconSize: [25,41],
        iconAnchor: [12,41],
        popupAnchor: [1,-34]
      });
    }
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])
      );
    }
  });
</script>
</body>
</html>
