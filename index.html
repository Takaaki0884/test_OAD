<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>スポットマップ</title>

<!-- OSM Referer 対策 -->
<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- Leaflet -->
https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
https://unpkg.com/leaflet@1.9.4/dist/leaflet.jsscript>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; }

/* フィルタパネル */
#filterPanel {
  position:absolute;
  top:10px;
  left:10px;
  z-index:1000;
  background:#fff;
  padding:10px 12px;
  border-radius:8px;
  box-shadow:0 1px 6px rgba(0,0,0,.25);
  font-size:13px;
  max-height:70vh;
  overflow:auto;
}
#filterPanel label {
  display:flex;
  align-items:center;
  margin:4px 0;
  cursor:pointer;
}
.swatch {
  width:12px;
  height:12px;
  border-radius:50%;
  margin-right:6px;
  border:2px solid rgba(0,0,0,.3);
}

/* ポップアップ */
.popup img {
  width:220px;
  max-width:100%;
  border-radius:6px;
  display:block;
  margin:6px 0;
}
.popup .meta {
  font-size:12px;
  color:#555;
}
.popup .desc {
  margin-top:6px;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<div id="map"></div>
<div id="filterPanel"><b>カテゴリ</b><br></div>

<script>
/* =====================================================
   スポットデータ（data_spot.csv → JSON埋め込み）
   link は CSV の URL カラムを使用
   ===================================================== */
const spots = [
  {
    "id":"EV01005001",
    "category":"アート・デザイン",
    "name":"展示会場：［加藤雅貴］",
    "spot":"中之島フェスティバルタワー １Fエントランス",
    "description":"展示会場：［加藤雅貴］",
    "lat":34.69356168,
    "lng":135.496272,
    "image":"https://adpf-poc.com/machiapps/userdata/photos/machi/7d793da7-c8f3-40df-af7b-1d5a996d1351_thumbnail.jpeg",
    "link":"URLカラムの値"
  }
  /* ★ここに CSV 全件分が続きます（省略せず追加してください） */
];

/* =====================================================
   カテゴリ → 色（自動割当）
   ===================================================== */
const palette = [
  "#e6194b","#3cb44b","#4363d8","#f58231",
  "#911eb4","#46f0f0","#f032e6","#bcf60c",
  "#008080","#9a6324","#808000","#000075"
];

const categories = [...new Set(spots.map(s => s.category))];
const categoryColors = {};
categories.forEach((c,i)=>categoryColors[c]=palette[i%palette.length]);

/* =====================================================
   Leaflet Map
   ===================================================== */
const map = L.map("map");

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:'&copy; <a href="https://www.openstreetmap.org/cpenStreetMap</a> contributors'
}).addTo(map);

const layers = {};
categories.forEach(c => layers[c] = L.layerGroup().addTo(map));

/* SVG ピン */
function pinIcon(color){
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="25" height="41" viewBox="0 0 25 41">
    <path d="M12.5 0C5.6 0 0 5.6 0 12.5C0 22.2 12.5 41 12.5 41S25 22.2 25 12.5C25 5.6 19.4 0 12.5 0Z"
      fill="${color}" stroke="rgba(0,0,0,.3)" stroke-width="1"/>
    <circle cx="12.5" cy="12.5" r="5" fill="white"/>
  </svg>`;
  return L.icon({
    iconUrl:"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(svg),
    iconSize:[25,41],
    iconAnchor:[12,41],
    popupAnchor:[1,-34]
  });
}

/* マーカー生成 */
const bounds=[];
spots.forEach(s=>{
  if(!isFinite(s.lat)||!isFinite(s.lng))return;
  bounds.push([s.lat,s.lng]);

  const popup=`
    <div class="popup">
      <strong>${escapeHtml(s.name)}</strong>
      <div class="meta">${escapeHtml(s.category)} / ${escapeHtml(s.spot)}</div>
      ${s.image?`<img src="${encodeURI(s""}
      <div class="desc">${escapeHtml(s.description||"")}</div>
      ${s.link?`<a href="${encodeURI(s.link)}" target    </div>`;

  L.marker([s.lat,s.lng],{icon:pinIcon(categoryColors[s.category])})
    .bindPopup(popup)
    .addTo(layers[s.category]);
});

if(bounds.length){
  map.fitBounds(bounds,{padding:[20,20]});
}

/* =====================================================
   カテゴリフィルタ UI
   ===================================================== */
const panel=document.getElementById("filterPanel");

categories.forEach(cat=>{
  const label=document.createElement("label");
  const cb=document.createElement("input");
  cb.type="checkbox";
  cb.checked=true;
  cb.onchange=()=>cb.checked?map.addLayer(layers[cat]):map.removeLayer(layers[cat]);

  const sw=document.createElement("span");
  sw.className="swatch";
  sw.style.background=categoryColors[cat];

  label.appendChild(cb);
  label.appendChild(sw);
  label.appendChild(document.createTextNode(cat));
  panel.appendChild(label);
});

/* util */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,m=>(
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]
  ));
}
</script>
</body>
</html>
