<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>スポットマップ</title>

  <meta name="referrer" content="strict-origin-when-cross-origin">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { height: 100%; margin: 0; font-family: sans-serif; }
    #map { height: 100%; }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,.25);
      font-size: 13px;
      max-height: 70vh;
      overflow-y: auto;
      min-width: 220px;
    }
    .panel h3 { margin: 0 0 8px; font-size: 14px; }
    .panel .row { display:flex; align-items:center; gap: 8px; margin: 6px 0; }
    .panel button {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      cursor: pointer;
    }
    .panel button:hover { background: #eee; }
    .panel label {
      display:flex;
      align-items:center;
      margin: 4px 0;
      cursor: pointer;
      user-select:none;
    }
    .panel .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin: 0 6px;
      border: 2px solid rgba(0,0,0,.3);
      flex: 0 0 auto;
    }
    .panel input[type="search"]{
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 13px;
      margin: 6px 0 8px;
    }
    .panel small { color:#666; display:block; margin-top: 8px; line-height: 1.4; }

    .popup img {
      width: 240px;
      max-width: 100%;
      border-radius: 8px;
      display:block;
      margin: 6px 0;
    }
    .popup .meta { font-size: 11px; color: #777; margin-top: 2px; }
    .popup .desc { margin-top: 6px; white-space: pre-wrap; font-size: 13px; }
    .popup a { display: inline-block; margin-top: 8px; text-decoration: none; color: #0078ff; }

    .legend {
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      font-size: 12px;
      line-height: 1.3;
      max-height: 45vh;
      overflow-y: auto;
    }
    .legend .lrow { display:flex; align-items:center; margin: 4px 0; }
    .legend .lswatch {
      width: 12px; height: 12px; border-radius: 50%;
      margin-right: 8px; border: 2px solid rgba(0,0,0,.35);
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel" id="panel">
    <h3>カテゴリ</h3>
    <input id="searchBox" type="search" placeholder="カテゴリを絞り込み" />
    <div class="row">
      <button id="btnAllOn" type="button">全選択</button>
      <button id="btnAllOff" type="button">全解除</button>
      <button id="btnFit" type="button">範囲更新</button>
    </div>
    <div id="categoryList"></div>
    <small>※ <code>spots.json</code> を読み込んで表示します。</small>
  </div>

  <script>
    const map = L.map('map').setView([35.681, 139.767], 13); // 初期位置

    // ベースマップの定義 (Attributionの<a>タグを修正)
    const osmStandard = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    });

    const cartoPositron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>'
    });

    const cartoVoyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>'
    });

    const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>'
    });

    osmStandard.addTo(map);

    L.control.layers({
      'OSM 標準': osmStandard,
      'CARTO Light': cartoPositron,
      'CARTO Voyager': cartoVoyager,
      'CARTO Dark': cartoDark
    }).addTo(map);

    // --- ロジック ---
    const palette = [
  '#e6194b', // 鮮やかな赤
  '#800000', // マルーン（濃い茶赤）
  '#ff4d4d', // 明るいレッド
  '#a52a2a', // ブラウンレッド
  '#ff8c00', // ダークオレンジ
  '#dc143c', // クリムゾン
  '#ff1493', // ディープピンク
  '#b22222', // ファイヤーブリック（煉瓦色）
  '#ff7f50', // コーラル
  '#8b0000', // ダークレッド
  '#ff6347', // トマト
  '#c71585', // ミディアムバイオレットレッド
  '#db7093', // ペールバイオレットレッド
  '#fa8072'  // サーモンピンク
];
    let categoryColors = {}, categoryLayers = {}, categoryState = {};

    const categoryListEl = document.getElementById('categoryList');
    const searchBoxEl = document.getElementById('searchBox');

    // 凡例の設定
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = '<b>カテゴリ凡例</b><div id="legendRows" style="margin-top:6px;"></div>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    legend.addTo(map);

    function pinIcon(color) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="25" height="41" viewBox="0 0 25 41"><path d="M12.5 0C5.6 0 0 5.6 0 12.5C0 22.2 12.5 41 12.5 41S25 22.2 25 12.5C25 5.6 19.4 0 12.5 0Z" fill="${color}" stroke="rgba(0,0,0,0.25)" stroke-width="1"/><circle cx="12.5" cy="12.5" r="5" fill="white" fill-opacity="0.9"/></svg>`;
      return L.icon({
        iconUrl: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34]
      });
    }

    function escapeHtml(str) {
      if(!str) return "";
      return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function buildPopup(s) {
      const title = `<strong>${escapeHtml(s.name)}</strong>`;
      const meta = `<div class="meta">${escapeHtml(s.category)}${s.spot ? ' / ' + escapeHtml(s.spot) : ''}</div>`;
      const img = (s.image && s.image.startsWith('http')) ? `<img src="${encodeURI(s.image)}" alt="" />` : '';
      const desc = `<div class="desc">${escapeHtml(s.description)}</div>`;
      const link = (s.link && s.link.startsWith('http')) ? `<a href="${encodeURI(s.link)}" target="_blank">詳細を見る →</a>` : '';
      return `<div class="popup">${title}${meta}${img}${desc}${link}</div>`;
    }

    function renderCategoryList() {
      const q = (searchBoxEl.value || '').trim().toLowerCase();
      const cats = Object.keys(categoryColors).sort().filter(cat => q === '' || cat.toLowerCase().includes(q));

      categoryListEl.innerHTML = cats.map(cat => `
        <label>
          <input type="checkbox" data-cat="${escapeHtml(cat)}" ${categoryState[cat] ? 'checked' : ''}>
          <span class="swatch" style="background:${categoryColors[cat]}"></span>
          ${escapeHtml(cat)}
        </label>
      `).join('');

      categoryListEl.querySelectorAll('input').forEach(cb => {
        cb.onchange = (e) => {
          const cat = e.target.getAttribute('data-cat');
          categoryState[cat] = e.target.checked;
          if (categoryState[cat]) map.addLayer(categoryLayers[cat]);
          else map.removeLayer(categoryLayers[cat]);
        };
      });
    }

    function renderLegend() {
      const rowsEl = document.getElementById('legendRows');
      if (rowsEl) {
        rowsEl.innerHTML = Object.keys(categoryColors).sort().map(cat => `
          <div class="lrow"><span class="lswatch" style="background:${categoryColors[cat]}"></span>${escapeHtml(cat)}</div>
        `).join('');
      }
    }

    // ボタンイベント
    document.getElementById('btnAllOn').onclick = () => {
      Object.keys(categoryState).forEach(c => { categoryState[c] = true; map.addLayer(categoryLayers[c]); });
      renderCategoryList();
    };
    document.getElementById('btnAllOff').onclick = () => {
      Object.keys(categoryState).forEach(c => { categoryState[c] = false; map.removeLayer(categoryLayers[c]); });
      renderCategoryList();
    };
    document.getElementById('btnFit').onclick = () => {
      const group = new L.featureGroup();
      Object.keys(categoryLayers).forEach(c => { if(categoryState[c]) categoryLayers[c].eachLayer(l => group.addLayer(l)); });
      if (group.getLayers().length > 0) map.fitBounds(group.getBounds(), {padding: [30,30]});
    };
    searchBoxEl.oninput = () => renderCategoryList();

    // JSON 読み込み
    fetch('./spots.json')
      .then(r => r.json())
      .then(spots => {
        const categories = Array.from(new Set(spots.map(s => s.category || '未分類'))).sort();
        categories.forEach((c, i) => {
          categoryColors[c] = palette[i % palette.length];
          categoryLayers[c] = L.layerGroup().addTo(map);
          categoryState[c] = true;
        });

        spots.forEach(s => {
          if (!isFinite(s.lat) || !isFinite(s.lng)) return;
          const cat = s.category || '未分類';
          L.marker([s.lat, s.lng], { icon: pinIcon(categoryColors[cat]) })
            .bindPopup(buildPopup(s))
            .addTo(categoryLayers[cat]);
        });

        renderLegend();
        renderCategoryList();
        document.getElementById('btnFit').click();
      })
      .catch(err => alert("データの読み込みに失敗しました。サーバー上で実行してください。"));
  </script>
</body>
</html>
